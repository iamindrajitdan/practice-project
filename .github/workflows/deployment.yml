name: Deployment Workflow
on: push
jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '18'

            - name: Install dependencies
              run: npm install

            - name: Fix audit issues
              run: npm audit fix --force

            - name: Run linting
              run: npm run lint
    tests:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '18'

            - name: Install dependencies
              run: npm install

            - name: Fix audit issues
              run: npm audit fix --force

            - name: Run linting
              run: npm run lint

            - name: Run tests
              run: npm test

    deploy:
        runs-on: ubuntu-latest
        needs: [lint, tests]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '18'

            - name: Install dependencies
              run: npm install

            - name: Fix audit issues
              run: npm audit fix --force

            - name: Build project
              run: npm run build

            - name: Deploy to server
              run: echo "Deploying to server..."
                # Add your deployment commands here